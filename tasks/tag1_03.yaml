title: Praktikumsbetrieb prüfen
difficulty: 3
question: |
  Du bewirbst dich bei drei IT-Betrieben für dein Praktikum. Betrieb A bietet nur Helpdesk ohne Entwicklung (du willst AE). Betrieb B hat keinen anerkannten Ausbilder. Betrieb C ist IHK-anerkannt, hat AE-Projekte und Mentoring.

  1. Welcher Betrieb erfüllt die **gesetzlichen Mindestanforderungen** für eine Ausbildung?
  2. Welcher Betrieb ist für **dein Ziel AE** am besten geeignet?
  3. Nenne **4 Kriterien**, die du bei der Betriebswahl zusätzlich prüfen würdest.
tip: |
  Ausbildungsbefähigung und Passung zur Fachrichtung sind zentrale Punkte.
solution: |
  1. Betrieb C (und theoretisch A und B nur wenn Ausbildungsbefähigung vorhanden – B vermutlich nicht).
  2. Betrieb C – AE-Projekte und Mentoring.
  3. Beispiele: Technologie-Stack, Übernahmechancen, Arbeitszeiten, Vergütung/Tarif, Teamgröße IT, Homeoffice-Regelung.
