title: Sozialversicherung – Gesamtfall
difficulty: 4
question: |
  **Szenario:** 42 Jahre. **Vor** Beginn der Ausbildung war die Person ohne eigenes Einkommen über die Ehepartnerin **familienversichert** und bezog zuletzt **ALG I**. Ab September beginnt sie eine **reguläre Ausbildung** (Ausbildungsvertrag, 1.050 € Ausbildungsvergütung).

  ---

  **Aufgabe:**

  1. Was passiert mit der Krankenversicherung **während des ALG-I-Bezugs**? Bleibt die Familienversicherung? Wer zahlt die Rentenbeiträge?

  2. Welche Versicherungen greifen **mit Beginn der Ausbildung**, wer zahlt die Beiträge?

  3. Warum ist eine **Familienversicherung während der Ausbildung** nicht möglich?

  4. Erstelle eine **Beratungs-Checkliste** für den Übergang (8 Punkte).

  **Deliverables:** Checkliste + kurze Erläuterungen
tip: |
  ALG-I-Bezug und Ausbildung lösen jeweils eine eigene Versicherungspflicht aus – beides schließt die beitragsfreie Familienversicherung aus.
solution: |
  1. Während des ALG-I-Bezugs eigenständige Pflichtversicherung in KV/PV über die Agentur; die Familienversicherung endet; die Agentur zahlt auch Rentenbeiträge.
  2. Mit Beginn der Ausbildung Pflichtversicherung in allen fünf Zweigen (KV/PV/RV/AV; UV über den Betrieb); Beiträge von AG und AN geteilt (unter Geringverdienergrenze AG allein).
  3. Azubis gelten als Beschäftigte und sind ab dem ersten Euro eigenständig pflichtversichert – eine beitragsfreie Familienversicherung ist ausgeschlossen.
  4. Checkliste (Beispiele): Krankenkasse wählen/ummelden; Statuswechsel der Agentur melden; Ende der Familienversicherung mit der Kasse klären; Rentenversicherungsnummer bereithalten; Anmeldung zur SV durch den Arbeitgeber; Steuer-ID/Steuerklasse klären; Beitrags- und Nettohöhe prüfen; Beratungstermin bei Krankenkasse/Agentur.
