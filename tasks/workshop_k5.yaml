title: Sozialrecht – Gesamtfall
difficulty: 4
question: |
  **Szenario:** Umschüler, 42 Jahre. Phase 1: ALG I während Unterricht. Phase 2: Ausbildung im Betrieb ab September. Familienversicherung über Ehepartner bisher.

  ---

  **Aufgabe:**

  1. Kläre für **Phase 1**: Krankenversicherung, ALG-Bezug, Rentenansprüche.

  2. Kläre für **Phase 2**: Welche Versicherungen greifen, wer zahlt Beiträge?

  3. **Familienversicherung**: Bleibt sie möglich bei Ausbildungsvergütung? Was prüfen?

  4. Erstelle eine **Beratungs-Checkliste** für den Übergang (8 Punkte).

  **Deliverables:** Checkliste + kurze Erläuterungen
solution: |
  Phase 1: KV über ALG; Phase 2: SV-pflichtig; Familienversicherung abhängig von Grenze und Ehepartner-Einkommen; Checkliste: Status, Grenzen, Bescheide, Arbeitgeber-Meldung, UV, Rentenkasse informieren.
