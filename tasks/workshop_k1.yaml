title: Dein Weg in der Umschulung
difficulty: 4
question: |
  **Szenario:** Du bist in der ersten Phase deiner Umschulung zum Fachinformatiker (Fachrichtung SI). Der Praktikumsbetrieb beginnt in 8 Monaten. Du hast noch keinen Betrieb.

  ---

  **Aufgabe (allein oder in der Lerngruppe):**

  1. Beschreibe deine **eigene Rolle** in der Umschulung in ca. 10 Sätzen (Lernorte, Verantwortung, Unterschied zur regulären Ausbildung).

  2. Erstelle eine **Checkliste** mit mindestens 8 Punkten: Was muss ein geeigneter Praktikumsbetrieb für SI erfüllen?

  3. Plane einen **Zeitstrahl** von heute bis Praktikumsstart: Welche Schritte (Bewerbung, Kammer, Vertrag, BAP) in welchem Monat?

  4. Formuliere **3 Fragen**, die du in einem Bewerbungsgespräch mit einem IT-Betrieb stellen würdest – bezogen auf Ausbildungsqualität.

  **Deliverables:** Kurzes Dokument (1–2 Seiten) oder strukturierte Stichpunktliste
tip: |
  Teilt Aufgaben: eine Person Rolle, eine Checkliste, eine Zeitplanung, eine Gesprächsfragen.
solution: |
  Bewertungskriterien: Rolle differenziert beschrieben; Checkliste enthält Eignung, Ausbilder, BAP, Vergütung, SI-Inhalte; Zeitstrahl realistisch; Gesprächsfragen zielen auf BAP, Mentoring, Technologien ab.
