title: BAP und Ausbildungsordnung vergleichen
difficulty: 4
question: |
  **Szenario:** Du startest in 2 Monaten im Praktikumsbetrieb (Fachinformatiker AE). Der Betrieb hat dir den BAP per E-Mail geschickt – 4 Seiten, viele Helpdesk-Einträge, wenig Entwicklung.

  ---

  **Aufgabe:**

  1. Besorge (online) die **Struktur** der Ausbildungsordnung Fachinformatiker AE – liste 6 zentrale Qualifikationsbereiche.

  2. Erstelle eine **Matrix**: Ordnungsinhalt | im BAP vorhanden? | geplante Maßnahme falls nicht.

  3. Formuliere **5 Punkte** für ein Gespräch mit dem Ausbilder zur Verbesserung des BAP.

  4. Beschreibe, wie **Unterrichtsphase** und **Betrieb** zusammenwirken sollen.

  **Deliverables:** Matrix + Gesprächsagenda
solution: |
  Matrix zeigt Lücken; Gesprächspunkte konkret und lösungsorientiert; Zusammenwirken: Theorie im Träger, Praxis im Betrieb, Berichtsheft verknüpft beides.
