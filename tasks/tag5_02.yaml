title: Sozialversicherung in der Umschulung
difficulty: 2
question: |
  Vergleiche die **Sozialversicherungssituation** in zwei Phasen:

  1. Unterrichtsphase beim Bildungsträger (ohne Beschäftigung)
  2. Praktikumsphase mit Ausbildungsvertrag

  Tabelle: Phase | Krankenversicherung | Rentenversicherung | Besonderheiten
tip: |
  Bei ALG-I-Bezug bist du eigenständig pflichtversichert – nicht familienversichert. Kein Arbeitnehmerstatus beim Träger.
solution: |
  Unterricht (ALG-I-Bezug): KV/PV als eigenständige Pflichtversicherung über die Bundesagentur; die Agentur zahlt auch RV-Beiträge; kein Beschäftigungsverhältnis beim Träger.
  Praktikum: volle SV-Pflicht als Azubi (KV/PV/RV/AV), Beiträge von AG und AN geteilt (unter Geringverdienergrenze AG allein); UV über den Betrieb, auch in Berufsschulzeiten.
