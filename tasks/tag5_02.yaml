title: Sozialversicherung in der Umschulung
difficulty: 2
question: |
  Vergleiche die **Sozialversicherungssituation** in zwei Phasen:

  1. Unterrichtsphase beim Bildungsträger (ohne Beschäftigung)
  2. Praktikumsphase mit Ausbildungsvertrag

  Tabelle: Phase | Krankenversicherung | Rentenversicherung | Besonderheiten
tip: |
  In Unterrichtsphase oft ALG – kein klassischer Arbeitnehmerstatus beim Träger.
solution: |
  Unterricht: KV über ALG/Familie/vorherige Versicherung; keine RV aus Beschäftigung beim Träger.
  Praktikum: volle SV-Pflicht als Azubi, UV auch in Berufsschule.
