title: Kündigung in der Ausbildung
difficulty: 2
question: |
  Beschreibe die **Kündigungsregeln** in der Ausbildung:

  1. Kündigung durch den Betrieb in den ersten 6 Monaten
  2. Kündigung durch den Betrieb nach 6 Monaten
  3. Kündigung durch die Auszubildende Person

  Je 2–3 Sätze.
tip: |
  Wichtiger Grund und Kammer/Zustimmung nach 6 Monaten.
solution: |
  1. In ersten 6 Monaten ohne wichtigen Grund möglich (Frist beachten).
  2. Nach 6 Monaten nur mit wichtigem Grund oder Zustimmung zuständiger Stelle.
  3. Azubi: 4 Wochen zum Monatsende oder Ausbildungsende.
